<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Post-card</title>
    <link rel="stylesheet" href="./pricing.css" />
  </head>
  <body>
    <!-- Main pricing wrapper -->
    <div class="pricing-wrapper">
      <!-- HEADER SECTION -->
      <div class="header">
        <h1>Our Pricing Plans</h1>
        <p>7 Days Free Trial. No Credit Card Required.</p>
      </div>

      <!-- BILLING SECTION -->
      <!-- container for save badge and toggle button -->
      <div class="billing-section">
        <div class="save-badge-wrapper">
          <!-- <span class=""></span> pending when we put icon -->
          <span class="save-badge">Save 20%</span>
        </div>

        <!-- toggle buttons for billing -->
        <div class="toggle-container">
          <button class="toggled-btn active">Billed Yearly</button>
          <button class="toggled-btn">Billed Monthly</button>
        </div>
      </div>
      <!-- PRICING CARDS SECTION -->
      <!-- Cards container -->
      <div class="cards-container">
        <!-- FREE PLAN CARD -->
        <div class="pricing-card">
          <div class="card-header">
            <h2 class="plan-name">Free Plan</h2>
            <h1 class="price">$0</h1>
            <p class="billing-period">Lifetime</p>
          </div>
          <button class="purchase-btn">Purchase Plan</button>
        </div>
        <!-- ADVANCED PLAN CARD (PREMIUM) -->
        <div class="pricing-card premium">
          <!-- Popular badge -->
          <span class="popular-badge">Most Popular</span>
          <div class="card-header">
            <h2 class="plan-name">Advanced Plan</h2>
            <h1 class="price">$150</h1>
            <p class="billing-period">Billed Monthly</p>
          </div>
          <button class="purchase-btn">Purchase Plan</button>
        </div>

        <!-- TEAM PLAN CARD -->
        <div class="pricing-card">
          <div class="card-header">
            <h2 class="plan-name">Team Plan</h2>
            <h1 class="price">$180</h1>
            <p class="billing-period">Per Month</p>
          </div>
          <button class="purchase-btn">Purchase Plan</button>
        </div>
      </div>
    </div>
  </body>
</html>
